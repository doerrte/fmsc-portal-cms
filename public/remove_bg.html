<!DOCTYPE html>
<html>
<body>
  <canvas id="canvas" style="display:none;"></canvas>
  <div id="status">Loading...</div>
  <textarea id="result" style="width:100%; height:300px; display:none;"></textarea>
  <script src="remove_bg_data.js"></script>
  <script>
    const img = new Image();
    img.onload = () => {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
      
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i];
        const g = data[i+1];
        const b = data[i+2];
        
        // If the pixel is near white, set it to transparent
        if (r > 240 && g > 240 && b > 240) {
          data[i+3] = 0;
        }
      }
      
      ctx.putImageData(imageData, 0, 0);
      const resultData = canvas.toDataURL('image/png');
      const resultArea = document.getElementById('result');
      resultArea.value = resultData;
      resultArea.style.display = 'block';
      document.getElementById('status').textContent = 'DONE';
    };
    img.src = logoData;
  </script>
</body>
</html>
